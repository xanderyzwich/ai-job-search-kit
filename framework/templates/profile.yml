# Template: profile.yml
#
# Copy this to private/profile.yml and fill in every value. Framework skill
# files reference these as variables ("the candidate's floor," "the
# candidate's constraints") rather than hardcoding a number, so this is the
# one file that needs a real value everywhere else has a placeholder.
#
# Full field-by-field explanation lives in framework/CONTRACT.md, under
# "profile.yml schema." This file matches that schema exactly; if the two
# ever disagree, CONTRACT.md is the one to trust and this template needs
# fixing.

identity:
  name: ""
  email: ""
  linkedin: ""                      # e.g. linkedin.com/in/yourname
  website: ""                       # optional, leave "" if none
  phone: ""
  location: ""                      # city, state, zip — used for "where are you based" fields
  address: ""                       # optional, only fill in if a form actually needs a street address

application_defaults:
  authorized_to_work_us: true
  requires_sponsorship: false
  desired_salary_usd: 0              # what to type into a "desired salary" field, if asked
  eeo_policy: "always select the opt-out option ('I don't wish to answer' or
    equivalent) on every demographic question, including gender, race/ethnicity,
    sexual orientation, transgender status, disability, and veteran status.
    Never fill in an identifying answer."
  reasons_for_leaving:
    # one key per employer, keyed however makes sense to you; the value is
    # what to say if asked in an application or a screen
    employer_one: ""
    employer_two: ""

constraints:
  remote: "fully remote only"       # or "hybrid ok," "open to relocation," etc — say what's actually true
  base_salary_floor_usd: 0
  lateral_ok: true                  # would you take a lateral move for the right role?
  no_relocation_to: []              # list of states/regions you won't move to, if any — leave [] if none
  relocation_reason: ""             # why, if it matters (purchasing power, family, etc)
  travel: ""                        # e.g. "no recurring travel; one-time onboarding trips fine"

role_criteria:
  seniority: []                     # e.g. ["Senior", "Staff", "Principal"]
  scope: ""                         # e.g. "hands-on with architectural influence, IC or PC, not pure management"
  domain: ""                        # e.g. "backend / platform / distributed systems"
  title_is_secondary_to: []         # what actually matters more than the title — e.g. ["compensation", "scope"]

# The lane pattern is explained in framework/skills/resume-lane-strategy.md.
# You don't have to use two lanes — if your search only has one shape, just
# fill in ic and leave pc's titles empty.
lanes:
  pc:
    label: ""                      # e.g. "small-org hands-on leadership"
    org_size: ""                   # e.g. "~10-30 engineers"
    titles: []
  ic:
    label: ""                      # e.g. "large-org IC / platform bridge"
    org_size: ""
    titles: []

linkedin_open_to_work_titles: []    # the exact titles you've set (or plan to set) on LinkedIn
